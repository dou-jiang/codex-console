<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定时任务 - OpenAI 注册系统</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏰</text></svg>">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand">
                <h1>OpenAI 注册系统</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">注册</a>
                <a href="/accounts" class="nav-link">账号管理</a>
                <a href="/email-services" class="nav-link">邮箱服务</a>
                <a href="/scheduled-tasks" class="nav-link active">定时任务</a>
                <a href="/payment" class="nav-link">支付</a>
                <a href="/settings" class="nav-link">设置</a>
                <a href="/logout" class="nav-link">退出</a>
            </div>
            <button class="theme-toggle" onclick="theme.toggle()" title="切换主题">
                🌙
            </button>
        </nav>

        <main class="main-content">
            <div class="page-header">
                <h2>定时任务</h2>
                <p class="subtitle">查看定时计划状态、执行记录和运行日志</p>
            </div>

            <div class="card">
                <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
                    <h3>计划列表</h3>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <button class="btn btn-primary btn-sm" id="create-plan-btn" data-action="create-plan">➕ 新建计划</button>
                        <button class="btn btn-secondary btn-sm" id="refresh-plans-btn" data-action="refresh-plans">🔄 刷新</button>
                    </div>
                </div>
                <div class="card-body" style="padding:0;">
                    <div class="table-container">
                        <table id="scheduled-plans-table" class="data-table">
                            <thead>
                                <tr>
                                    <th style="width: 70px;">ID</th>
                                    <th>计划名称</th>
                                    <th style="width: 110px;">任务类型</th>
                                    <th style="width: 120px;">触发方式</th>
                                    <th style="width: 180px;">下次执行</th>
                                    <th style="width: 100px;">状态</th>
                                    <th style="width: 180px;">最近运行</th>
                                    <th style="width: 240px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="scheduled-plans-table-body">
                                <tr>
                                    <td colspan="8">
                                        <div class="empty-state">
                                            <div class="empty-state-icon">⏳</div>
                                            <div class="empty-state-title">加载中</div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="plan-form-modal" class="modal">
        <div class="modal-content" style="max-width: 640px;">
            <div class="modal-header">
                <h3 id="plan-form-title">新建计划</h3>
                <button class="modal-close" data-close-modal="plan-form-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="plan-form">
                    <input type="hidden" id="plan-id">
                    <div class="form-group">
                        <label for="plan-name">计划名称</label>
                        <input type="text" id="plan-name" required placeholder="例如：每小时补量">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="plan-task-type">任务类型</label>
                            <select id="plan-task-type" required>
                                <option value="cpa_cleanup">CPA 清理</option>
                                <option value="cpa_refill">CPA 补量</option>
                                <option value="account_refresh">账号刷新</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="plan-cpa-service-select">CPA 服务</label>
                            <select id="plan-cpa-service-select"></select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="plan-cpa-service-id">CPA 服务 ID（手动输入可覆盖下拉选择）</label>
                        <input type="number" id="plan-cpa-service-id" min="1" required placeholder="1">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="plan-trigger-type">触发方式</label>
                            <select id="plan-trigger-type" required>
                                <option value="interval">间隔</option>
                                <option value="cron">Cron</option>
                            </select>
                        </div>
                        <div class="form-group" id="plan-cron-group" style="display:none;">
                            <label for="plan-cron-expression">Cron 表达式</label>
                            <input type="text" id="plan-cron-expression" placeholder="0 * * * *">
                        </div>
                    </div>
                    <div class="form-row" id="plan-interval-group">
                        <div class="form-group">
                            <label for="plan-interval-value">间隔值</label>
                            <input type="number" id="plan-interval-value" min="1" value="60">
                        </div>
                        <div class="form-group">
                            <label for="plan-interval-unit">间隔单位</label>
                            <select id="plan-interval-unit">
                                <option value="minutes">分钟</option>
                                <option value="hours">小时</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="plan-config-json">配置 JSON</label>
                        <textarea id="plan-config-json" rows="6" placeholder='{"max_consecutive_failures": 10}'>{}</textarea>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="plan-enabled" checked>
                            保存后启用计划
                        </label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="plan-form-submit-btn">保存计划</button>
                        <button type="button" class="btn btn-secondary" data-close-modal="plan-form-modal">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="plan-modal" class="modal">
        <div class="modal-content" style="max-width: 520px;">
            <div class="modal-header">
                <h3>计划详情</h3>
                <button class="modal-close" data-close-modal="plan-modal">&times;</button>
            </div>
            <div class="modal-body" id="plan-modal-body">
                <div style="color: var(--text-muted);">计划详情加载中...</div>
            </div>
        </div>
    </div>

    <div id="run-log-modal" class="modal">
        <div class="modal-content" style="max-width: 760px;">
            <div class="modal-header">
                <h3>运行记录</h3>
                <button class="modal-close" data-close-modal="run-log-modal">&times;</button>
            </div>
            <div class="modal-body" id="run-log-modal-body">
                <div style="color: var(--text-muted);">暂无记录</div>
            </div>
        </div>
    </div>

    <script src="/static/js/utils.js?v={{ static_version }}"></script>
    <script src="/static/js/scheduled_tasks.js?v={{ static_version }}"></script>
</body>
</html>
